<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ekin Rehberi - Kayıt Ol</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <h1>Kayıt Ol</h1>
            <p class="subtitle">Sistemi kullanmak için hesap oluştur</p>

            <form id="registerForm">
                <div class="form-group">
                    <label for="fullName">Ad Soyad</label>
                    <input type="text" id="fullName" required />
                </div>

                <div class="form-group">
                    <label for="regEmail">E-posta</label>
                    <input type="email" id="regEmail" required />
                </div>

                <div class="form-group">
                    <label for="regPassword">Şifre</label>
                    <input type="password" id="regPassword" required />
                </div>

                <button type="submit" class="btn-primary">Kayıt Ol</button>
            </form>

            <div id="message" class="message"></div>

            <p style="margin-top: 18px;">
                Zaten hesabın var mı?
                <a href="login.html">Giriş yap</a>
            </p>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
